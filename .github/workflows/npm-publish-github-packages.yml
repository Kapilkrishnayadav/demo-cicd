name: Deploy via Upload

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Create zip
      - name: Zip project
        run: |
          zip -r app.zip . -x "node_modules/*" ".git/*"

      # 3. Upload to EC2
      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app.zip"
          target: "/home/ubuntu"

      # 4. SSH and deploy
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu

            # Remove old app
            rm -rf demo-cicd

            # Unzip new app
            unzip app.zip -d demo-cicd
            rm app.zip

            cd demo-cicd

            # Install dependencies
            npm install

            # Restart app
            pm2 restart demo-cicd || pm2 start index.js --name demo-cicd

            pm2 save
