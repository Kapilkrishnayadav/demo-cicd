name: Deploy to EC2 (Stable)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Create tar archive (BEST METHOD)
      - name: Create deployment package
        run: |
          git archive --format=tar.gz -o app.tar.gz HEAD

      # 3. Upload to EC2
      - name: Copy package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app.tar.gz"
          target: "/home/ubuntu"

      # 4. Deploy on EC2
      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2"

            cd /home/ubuntu

            # Backup old version (safe deploy)
            if [ -d "demo-cicd" ]; then
              mv demo-cicd demo-cicd_backup_$(date +%s)
            fi

            # Create new directory
            mkdir demo-cicd

            # Extract new code
            tar -xzf app.tar.gz -C demo-cicd
            rm app.tar.gz

            cd demo-cicd

            # Install dependencies
            npm ci

            # Restart app (zero downtime)
            pm2 reload demo-cicd || pm2 start index.js --name demo-cicd

            # Save PM2 process
            pm2 save

            echo "Deployment successful 🚀"
