name: Deploy Express App to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          # 1. Create a clean staging folder
          mkdir -p staging
          
          # 2. Copy only necessary files (Add other folders like 'public' if you have them)
          cp index.js package.json package-lock.json ecosystem.config.cjs staging/
          
          # 3. Create the tarball from the staging folder
          # Using -C ensures the tarball doesn't contain the 'staging/' folder itself
          tar -czf deploy.tar.gz -C staging .
          
          echo "✅ Deployment package created successfully."

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # Upload the tarball to /tmp
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/tmp/

          # Remote Execution
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'
            
            # 1. Ensure directory exists and reclaim ownership
            sudo mkdir -p /var/www/express-app
            sudo chown -R $USER:$USER /var/www/express-app
            cd /var/www/express-app

            # 2. Extract Files (overwrite old ones)
            tar -xzf /tmp/deploy.tar.gz -C /var/www/express-app
            rm /tmp/deploy.tar.gz

            # 3. Install production dependencies
            npm install --production

            # 4. Restart Application with PM2
            # We check for 'express-app' which is the name defined in your ecosystem file
            if pm2 describe express-app > /dev/null 2>&1; then
              echo "Reloading App..."
              pm2 reload ecosystem.config.cjs --update-env
            else
              echo "Starting App for the first time..."
              pm2 start ecosystem.config.cjs
            fi
            
            pm2 save
          EOF

          rm private_key.pem

      - name: Health Check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting for app to settle..."
          sleep 10
          # Check if the server returns any response at all
          curl -s --retry 5 --retry-delay 5 http://${EC2_HOST} > /dev/null && echo "✅ App is UP" || (echo "❌ App is DOWN" && exit 1)
