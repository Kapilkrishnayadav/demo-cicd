name: Deploy Express App to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          # Create a tarball of the necessary files only
          # Excluding node_modules, .git, and .github
          tar -czf deploy.tar.gz \
            --exclude='deploy.tar.gz' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            .

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # Upload the tarball
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/tmp/

          # Remote Execution
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'
            
            # 1. Setup Directory
            sudo mkdir -p /var/www/express-app
            sudo chown -R $USER:$USER /var/www/express-app
            cd /var/www/express-app

            # 2. Extract Files
            tar -xzf /tmp/deploy.tar.gz -C /var/www/express-app
            rm /tmp/deploy.tar.gz

            # 3. Install Dependencies
            npm install --production

            # 4. Restart Application
            if pm2 describe express-app > /dev/null 2>&1; then
              echo "Reloading App..."
              pm2 reload express-app --update-env
            else
              echo "Starting App..."
              pm2 start ecosystem.config.cjs
            fi
            
            pm2 save
          EOF

          rm private_key.pem

      - name: Health Check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Checking app status..."
          sleep 5
          curl -s --retry 3 --retry-delay 5 http://${EC2_HOST} | grep -q "" && echo "✅ App is UP" || (echo "❌ App is DOWN" && exit 1)
