name: Deploy via Upload (TAR)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Create tar file
      - name: Create tar package
        run: |
          tar --exclude='node_modules' \
              --exclude='.git' \
              -czf app.tar.gz .

      # 3. Upload to EC2
      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app.tar.gz"
          target: "/home/ubuntu"

      # 4. Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu

            # Remove old app
            rm -rf demo-cicd

            # Extract new app
            mkdir demo-cicd
            tar -xzf app.tar.gz -C demo-cicd
            rm app.tar.gz

            cd demo-cicd

            # Install dependencies
            npm ci

            # Restart app
            pm2 restart demo-cicd || pm2 start index.js --name demo-cicd

            pm2 save
